<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mua/Bán xe - BikeMarket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top shadow-sm bm-navbar py-3">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="./index.html">
        <i class="bi bi-bicycle text-primary"></i> MICRA
      </a>
      <div class="d-flex gap-3 align-items-center ms-auto">
        <a id="btnLoginNav" class="btn btn-outline-primary btn-sm fw-semibold" href="./login.html#login">
          <i class="bi bi-person-circle"></i> Đăng nhập
        </a>
        <button id="btnLogoutNav" class="btn btn-outline-danger btn-sm fw-semibold" style="display:none;">
          <i class="bi bi-box-arrow-right"></i> Đăng xuất
        </button>
        <a class="btn btn-outline-secondary btn-sm" href="./index.html"><i class="bi bi-arrow-left"></i> Trang chủ</a>
      </div>
    </div>
  </nav>
  <div class="container py-4 py-lg-5 listing-page">
    <section class="listing-hero mb-4 mb-lg-5">
      <div class="listing-hero-content">
        <span class="listing-hero-kicker">BikeMarket Marketplace</span>
        <h1 class="listing-hero-title">Mua xe dap phu hop voi nhu cau cua ban</h1>
        <p class="listing-hero-subtitle">
          Loc theo loai xe, muc gia va khu vuc de tim duoc chiec xe dap tot nhat trong vai giay.
        </p>
      </div>
      <div class="listing-hero-gallery" aria-label="Hình minh họa xe đạp">
        <figure class="listing-hero-figure">
          <img
            src="https://images.unsplash.com/photo-1485965120184-e220f721d03e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8YmlrZXxlbnwwfHwwfHx8MA%3D%3D"
            alt="Xe đạp đường phố, góc chụp nghiêng"
            width="600"
            height="400"
            loading="lazy"
            decoding="async"
          >
        </figure>
        <figure class="listing-hero-figure">
          <img
            src="https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8YmlrZXxlbnwwfHwwfHx8MA%3D%3D"
            alt="Xe đạp ngoài trời, ánh sáng tự nhiên"
            width="600"
            height="400"
            loading="lazy"
            decoding="async"
          >
        </figure>
        <figure class="listing-hero-figure">
          <img
            src="https://images.unsplash.com/photo-1593764592116-bfb2a97c642a?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTl8fGJpa2V8ZW58MHx8MHx8fDA%3D"
            alt="Nhiều xe đạp trên vỉa hè thành phố"
            width="600"
            height="400"
            loading="lazy"
            decoding="async"
          >
        </figure>
      </div>
    </section>
    <div id="alertBox"></div>
    <input id="baseUrlInput" class="form-control form-control-sm mb-4 d-none" value="http://localhost:8888/bike-shop1/public/index.php/api">
    
    <div class="card bm-soft-card mb-4 border-0 listing-toolbar-card listing-filter-card">
      <div class="card-body p-3 p-lg-4">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
          <h2 class="h6 m-0 fw-bold text-uppercase">Bo loc tim kiem</h2>
          <span class="listing-filter-hint text-muted">Toi uu cho nguoi mua xe thuc te</span>
        </div>
        <form id="listingFilterForm" class="listing-toolbar">
          <div class="row g-2 align-items-end">
            <div class="col-lg-2 col-md-3 col-sm-6">
              <label class="form-label small fw-500">Loại xe</label>
              <select name="bike_type_id" class="form-select form-select-sm">
                <option value="">Tất cả loại</option>
                <option value="1">Road Bike</option>
                <option value="2">Mountain Bike</option>
                <option value="4">Touring Bike</option>
              </select>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6">
              <label class="form-label small fw-500">Tìm kiếm</label>
              <input name="keyword" class="form-control form-control-sm" placeholder="Nhập tên xe...">
            </div>
            <div class="col-lg-2 col-md-3 col-sm-6">
              <label class="form-label small fw-500">Sắp xếp</label>
              <select name="sort" class="form-select form-select-sm">
                <option value="newest">Mới nhất</option>
                <option value="oldest">Cũ nhất</option>
                <option value="price_asc">Giá ↑</option>
                <option value="price_desc">Giá ↓</option>
              </select>
            </div>
            <div class="col-lg-2 col-md-3 col-sm-6">
              <label class="form-label small fw-500">Trạng thái</label>
              <select name="status" class="form-select form-select-sm">
                <option value="">Tất cả</option>
                <option value="published">Đang bán</option>
                <option value="reserved">Đã giữ chỗ</option>
                <option value="sold">Đã bán</option>
              </select>
            </div>
            <div class="col-lg-1 col-md-12 col-sm-6 d-grid">
              <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search"></i> Tìm</button>
            </div>
          </div>

          <div class="mt-3 pt-3 border-top">
            <button type="button" class="btn btn-link btn-sm p-0 listing-advanced-toggle" data-bs-toggle="collapse" data-bs-target="#advancedFilters">
              <i class="bi bi-funnel"></i> Bộ lọc nâng cao
            </button>
            <div id="advancedFilters" class="collapse mt-3">
              <div class="row g-2">
                <div class="col-md-2"><input name="brand_id" type="number" class="form-control form-control-sm" placeholder="Brand ID"></div>
                <div class="col-md-2"><input name="min_price" type="number" class="form-control form-control-sm" placeholder="Giá từ"></div>
                <div class="col-md-2"><input name="max_price" type="number" class="form-control form-control-sm" placeholder="Giá đến"></div>
                <div class="col-md-3"><input name="province" class="form-control form-control-sm" placeholder="Tỉnh/Thành phố"></div>
                <div class="col-md-3"><input name="district" class="form-control form-control-sm" placeholder="Quận/Huyện"></div>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 mb-lg-4">
      <h5 class="mb-0 fw-bold listing-result-title">Danh sach xe dang ban</h5>
      <button id="btnReloadListings" class="btn btn-outline-primary btn-sm px-3">
        <i class="bi bi-arrow-clockwise"></i> Tải lại
      </button>
    </div>
    <div id="listingsTableWrap" class="listing-results-wrap"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/state.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/chat.js"></script>
  <script src="./js/upload.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/listings.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
