<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Bike Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top shadow-sm bm-navbar py-3">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="./index.html"><i class="bi bi-bicycle text-primary"></i> BikeMarket</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary btn-sm" href="./index.html">Trang chủ</a>
        <a class="btn btn-outline-primary btn-sm" href="./listings.html">Mua xe</a>
        <a class="btn btn-outline-primary btn-sm" href="./chat.html">Chat</a>
        <button id="btnLogoutNav" class="btn btn-outline-danger btn-sm fw-semibold" style="display:none;">
          <i class="bi bi-box-arrow-right"></i> Đăng xuất
        </button>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="fw-bold m-0"><i class="bi bi-person-circle text-primary"></i> Hồ sơ cá nhân</h3>
      <a href="./index.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Về trang chủ</a>
    </div>
    <div id="alertBox"></div>
    <input id="baseUrlInput" class="form-control form-control-sm mb-3" value="http://localhost:8888/bike-shop1/public/index.php/api">

    <div class="card bm-soft-card mb-3 border-0">
      <div class="card-body d-flex gap-2">
        <button id="btnLoadMe" class="btn btn-primary">Load My Profile</button>
        <button id="btnLogout" class="btn btn-warning">Logout</button>
      </div>
    </div>

    <div class="card bm-soft-card border-0 mb-3 rounded-4">
      <div class="card-body">
        <h6 class="mb-3">Update Profile</h6>
        <form id="profileForm" class="row g-2">
          <div class="col-md-6"><input name="full_name" class="form-control" placeholder="Full name"></div>
          <div class="col-md-6"><input name="phone" class="form-control" placeholder="Phone"></div>
          <div class="col-md-12"><input name="avatar_url" class="form-control" placeholder="Avatar URL"></div>
          <div class="col-md-12"><textarea name="bio" class="form-control" placeholder="Bio"></textarea></div>
          <div class="col-md-6"><input name="province" class="form-control" placeholder="Province"></div>
          <div class="col-md-6"><input name="district" class="form-control" placeholder="District"></div>
          <div class="col-md-12 d-grid"><button class="btn btn-primary"><i class="bi bi-save"></i> Cập nhật thông tin</button></div>
        </form>
      </div>
    </div>

    <div class="card bm-soft-card border-0 mb-3 rounded-4">
      <div class="card-body">
        <h6 class="mb-3">Đổi mật khẩu</h6>
        <form id="passwordForm" class="row g-2">
          <div class="col-md-4"><input name="current_password" type="password" class="form-control" placeholder="Current password"></div>
          <div class="col-md-4"><input name="new_password" type="password" class="form-control" placeholder="New password"></div>
          <div class="col-md-4"><input name="confirm_password" type="password" class="form-control" placeholder="Confirm password"></div>
          <div class="col-md-12 d-grid"><button class="btn btn-dark"><i class="bi bi-shield-lock"></i> Đổi mật khẩu</button></div>
        </form>
      </div>
    </div>

    <div class="card bm-soft-card border-0">
      <div class="card-body">
        <h6 class="mb-3">Upload Image</h6>
        <form id="uploadForm" class="vstack gap-2">
          <select name="target" class="form-select">
            <option value="avatar">Avatar</option>
            <option value="listing">Listing</option>
            <option value="chat">Chat</option>
          </select>
          <input type="file" name="image" class="form-control" accept=".jpg,.jpeg,.png,.webp" required>
          <button class="btn btn-outline-primary">Upload Image</button>
        </form>
        <small class="text-muted d-block mt-2">Uploaded URL</small>
        <textarea id="uploadedUrl" class="form-control" rows="3" readonly></textarea>
        <div id="uploadedPreviewWrap" class="mt-3 d-none">
          <small class="text-muted d-block mb-2">Image preview</small>
          <img id="uploadedPreview" class="img-fluid rounded border" alt="Uploaded preview">
        </div>
      </div>
    </div>
  </div>

  <script src="./js/state.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/upload.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
