<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Bike Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top shadow-sm bm-navbar py-3">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="./index.html"><i class="bi bi-bicycle text-primary"></i> BikeMarket</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary btn-sm" href="./index.html">Trang chủ</a>
        <a class="btn btn-outline-primary btn-sm" href="./listings.html">Mua xe</a>
        <a class="btn btn-outline-primary btn-sm" href="./profile.html">Hồ sơ</a>
        <button id="btnLogoutNav" class="btn btn-outline-danger btn-sm fw-semibold" style="display:none;">
          <i class="bi bi-box-arrow-right"></i> Đăng xuất
        </button>
      </div>
    </div>
  </nav>
  <div class="container py-4">
    <div class="page-header d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0">Chat</h3>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="./index.html">Dashboard</a>
        <a class="btn btn-outline-light btn-sm" href="./listings.html">Listings</a>
        <a class="btn btn-outline-light btn-sm" href="./profile.html">Profile</a>
      </div>
    </div>
    <div id="alertBox"></div>
    <input id="baseUrlInput" class="form-control form-control-sm mb-3" value="http://localhost:8888/bike-shop1/public/index.php/api">

    <div class="card bm-soft-card mb-3 border-0">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="mb-0">Conversations</h6>
          <button id="btnReloadConversations" class="btn btn-sm btn-dark">Reload</button>
        </div>
        <form id="createConversationForm" class="row g-2 mb-3">
          <div class="col-md-8"><input name="listing_id" class="form-control" value="1"></div>
          <div class="col-md-4 d-grid"><button class="btn btn-outline-dark">Create Conversation</button></div>
        </form>
        <div id="conversationsWrap"></div>
      </div>
    </div>

    <div class="card bm-soft-card border-0">
      <div class="card-body">
        <form id="messageForm" class="row g-2">
          <div class="col-md-3"><input name="conversation_id" class="form-control" placeholder="conversation_id"></div>
          <div class="col-md-7"><input name="content" class="form-control" placeholder="Message"></div>
          <div class="col-md-2 d-grid"><button class="btn btn-success">Send</button></div>
        </form>
        <div class="mt-2 d-flex justify-content-end">
          <button id="btnLoadMessages" class="btn btn-sm btn-outline-primary" type="button">Load Messages</button>
        </div>
        <div id="messagesWrap" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script src="./js/state.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/chat.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
